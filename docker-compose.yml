services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./Backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    environment:
      # App
      PORT: "8000"
      NODE_ENV: ${NODE_ENV:-development}

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
